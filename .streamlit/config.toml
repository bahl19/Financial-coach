# Brand theme, defined natively so Streamlit's own widgets follow it.
#
# DARK ONLY. The same dark palette is declared for both the base theme and
# the dark variant deliberately: Streamlit picks between them from the
# viewer's Appearance setting (which follows the OS by default), so defining
# only one would still let a light-preferring visitor land on a derived light
# theme. Declaring both identical means the app renders dark for everyone,
# regardless of their OS or Streamlit preference. This matches the brand -
# UI/Financial Coach Landing.dc.html has no light variant at all.
#
# To re-enable light mode later: restore the light values under [theme]
# (base = "light", backgroundColor #f5f9f8, secondaryBackgroundColor #ffffff,
# textColor #0e1b2a, primaryColor/linkColor #0a7057, borderColor #d7e3e0,
# dataframeHeaderBackgroundColor #eaf3f0) and set `_FORCE_MODE = None` in
# utils/theme.py, which still carries the contrast-checked LIGHT palette.
#
# Why the palette is defined here rather than in CSS: several widgets read
# these values directly - the number-input steppers, the select dropdown, and
# the canvas-rendered dataframe grid - and cannot be restyled from a
# stylesheet at all.

[theme]
base = "dark"
primaryColor = "#5ef3ce"
backgroundColor = "#081527"
secondaryBackgroundColor = "#0d2238"
textColor = "#e8eff6"
linkColor = "#5ef3ce"
borderColor = "#1e344b"
dataframeHeaderBackgroundColor = "#0f2740"
chartCategoricalColors = ["#5ef3ce", "#12c96f", "#f5b942", "#ff7a7a", "#8ca3b8"]

[theme.sidebar]
backgroundColor = "#0d2238"
secondaryBackgroundColor = "#0f2740"
borderColor = "#1e344b"

[theme.dark]
base = "dark"
primaryColor = "#5ef3ce"
backgroundColor = "#081527"
secondaryBackgroundColor = "#0d2238"
textColor = "#e8eff6"
linkColor = "#5ef3ce"
borderColor = "#1e344b"
dataframeHeaderBackgroundColor = "#0f2740"

[theme.dark.sidebar]
backgroundColor = "#0d2238"
secondaryBackgroundColor = "#0f2740"
borderColor = "#1e344b"
